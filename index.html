<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/isan-web-dev/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="isan-c">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>isan-c</title>
  <link rel="manifest" href="manifest.json">

  <!-- MapLibre GL JS + CSS — provides the global `maplibregl` for the glmap node. -->
  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>

  <style>
    /* App shell. The page must not bounce, pull-to-refresh, or navigate on an
       overscroll: a vertical overscroll mid-design would reload (losing canvas
       state), and a two-finger horizontal swipe on a Mac trackpad was
       accidentally triggering the browser's back/forward navigation. Contain
       BOTH axes (`overscroll-behavior: none`) — the clean CSS containment, not
       the old popstate trap that was janky. The app owns its own scrolling. */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      /* Stop the browser's native text/element selection from hijacking a
         click-drag. On a Mac a drag on the canvas used to start a "heavy"
         browser selection (highlighting the page) and the wireframe's marquee
         only registered on a hard press; suppressing user-select hands every
         drag straight to the app, so a normal click-drag draws the selection
         rectangle. (touch-action is left at the default so the horizontal
         edge-swipe-back still works.) */
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }
    /* Belt-and-braces for the Flutter host element across engine versions. */
    flutter-view, flt-glass-pane {
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>

  <script>
    // App-shell gesture guards. The app owns its own scrolling and zoom.
    // `overscroll-behavior:none` (above) contains BOTH pull-to-refresh and the
    // horizontal swipe-to-navigate (which was accidentally going back a page on
    // a Mac trackpad). This block only blocks PAGE pinch-zoom (1).
    (function () {
      // 1) Block the browser's PAGE pinch-zoom. Chrome/Edge surface a trackpad
      //    pinch as a ctrl+wheel event; Safari uses gesture* events. The app's
      //    own zoom (e.g. the sheet's zoom control) is unaffected.
      window.addEventListener('wheel', function (e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });
      ['gesturestart', 'gesturechange', 'gestureend'].forEach(function (type) {
        window.addEventListener(type, function (e) { e.preventDefault(); }, { passive: false });
      });

      // 2) Back/forward navigation is intentionally NOT trapped. The old
      //    sentinel (pushState + re-assert on every popstate) was removed per
      //    user request: on a phone the edge-swipe-back fired anyway and the
      //    trap re-pushed the entry, leaving the back gesture stuck/janky. Let
      //    the browser back-swipe navigate normally; the app still offers its
      //    own on-screen back/exit.

      // 3) Auto-update on deploy. The deploy patches the service worker to
      //    skipWaiting + claim, so a fresh build's worker takes control of this
      //    open page (fires `controllerchange`). Reload ONCE so the new app code
      //    loads — this is what makes a deployed fix appear without the user
      //    having to hard-refresh / clear site data. Guarded so the first-ever
      //    SW install on a fresh client does NOT reload (no prior controller to
      //    replace), and so it never loops.
      if ('serviceWorker' in navigator) {
        var hadControllerAtLoad = !!navigator.serviceWorker.controller;
        var isReloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (isReloading || !hadControllerAtLoad) return;
          isReloading = true;
          window.location.reload();
        });
      }
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
